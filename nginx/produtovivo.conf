# nginx config for produtovivo.com
# Production app runs on localhost:3000
# Place at: /etc/nginx/sites-available/produtovivo.conf
# Enable with: ln -s /etc/nginx/sites-available/produtovivo.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name produtovivo.com www.produtovivo.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name produtovivo.com www.produtovivo.com;

    # SSL certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/produtovivo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/produtovivo.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Canonical: redirect www to non-www
    if ($host = www.produtovivo.com) {
        return 301 https://produtovivo.com$request_uri;
    }

    # Stripe webhook — pass raw body (no buffering interference)
    location /webhook/stripe {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_request_buffering off;
    }

    # All other traffic
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Access logs
    access_log /var/log/nginx/produtovivo.access.log;
    error_log  /var/log/nginx/produtovivo.error.log;
}
