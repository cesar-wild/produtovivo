name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy produtovivo.com
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.223.73.101
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/produtovivo
            git pull origin main
            npm install --omit=dev
            sudo systemctl restart produtovivo
            echo "Waiting for service to come up..."
            sleep 5
            curl -sf http://localhost:8082/health || (echo "Health check failed" && exit 1)
            echo "Deploy successful"

      - name: Verify health endpoint
        run: |
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://produtovivo.com/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Production health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Production health check returned HTTP $HTTP_STATUS — may still be warming up"
          fi
