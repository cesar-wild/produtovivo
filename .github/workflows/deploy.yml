name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual trigger'

jobs:
  deploy:
    name: Deploy produtovivo.com
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 5.223.73.101
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/produtovivo
            git pull origin main
            bash deploy.sh
            echo "Deploy successful"

      - name: Verify public health endpoint
        run: |
          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://produtovivo.com/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Production health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Production health check returned HTTP $HTTP_STATUS — may still be warming up"
            exit 1
          fi
