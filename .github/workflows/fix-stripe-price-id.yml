name: Fix STRIPE_PRICE_ID on production

on:
  workflow_dispatch:

jobs:
  fix-stripe-price-id:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Hetzner and patch .env
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 5.223.73.101
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            ENV_FILE="/opt/produtovivo/.env"

            echo "=== Checking STRIPE_PRICE_ID ==="
            if grep -qE "^STRIPE_PRICE_ID=price_" "$ENV_FILE" 2>/dev/null; then
              echo "STRIPE_PRICE_ID already configured:"
              grep "STRIPE_PRICE_ID" "$ENV_FILE"
              PRICE_ID=$(grep "^STRIPE_PRICE_ID=" "$ENV_FILE" | cut -d'=' -f2- | tr -d '"')
            else
              echo "STRIPE_PRICE_ID missing or empty. Querying Stripe API..."

              STRIPE_KEY=$(grep "^STRIPE_SECRET_KEY=" "$ENV_FILE" | cut -d'=' -f2- | tr -d '"')
              if [ -z "$STRIPE_KEY" ]; then
                echo "ERROR: STRIPE_SECRET_KEY not found in $ENV_FILE"
                exit 1
              fi

              # List all active one-time prices in BRL
              PRICES_JSON=$(curl -sf "https://api.stripe.com/v1/prices?currency=brl&active=true&limit=100&type=one_time" \
                -u "${STRIPE_KEY}:")
              echo "Stripe prices response (truncated):"
              echo "$PRICES_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p['id'], p.get('unit_amount'), p.get('currency')) for p in d.get('data',[])]" || true

              # Find price with unit_amount=3700
              PRICE_ID=$(echo "$PRICES_JSON" | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            for p in data.get('data', []):
                if p.get('unit_amount') == 3700:
                    print(p['id'])
                    break
            " 2>/dev/null || true)

              if [ -z "$PRICE_ID" ]; then
                echo "No existing R\$37.00 BRL price found. Creating product + price..."

                PRODUCT_JSON=$(curl -sf -X POST "https://api.stripe.com/v1/products" \
                  -u "${STRIPE_KEY}:" \
                  --data-urlencode "name=Guia ProdutoVivo v1")
                PRODUCT_ID=$(echo "$PRODUCT_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
                echo "Created product: $PRODUCT_ID"

                PRICE_JSON=$(curl -sf -X POST "https://api.stripe.com/v1/prices" \
                  -u "${STRIPE_KEY}:" \
                  -d "unit_amount=3700" \
                  -d "currency=brl" \
                  -d "product=${PRODUCT_ID}")
                PRICE_ID=$(echo "$PRICE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
                echo "Created price: $PRICE_ID"
              else
                echo "Found existing price: $PRICE_ID"
              fi

              # Write STRIPE_PRICE_ID into .env
              if grep -q "^STRIPE_PRICE_ID=" "$ENV_FILE"; then
                sed -i "s|^STRIPE_PRICE_ID=.*|STRIPE_PRICE_ID=${PRICE_ID}|" "$ENV_FILE"
                echo "Updated existing STRIPE_PRICE_ID in .env"
              else
                echo "STRIPE_PRICE_ID=${PRICE_ID}" >> "$ENV_FILE"
                echo "Appended STRIPE_PRICE_ID to .env"
              fi
            fi

            echo "=== Restarting container ==="
            cd /opt/produtovivo
            docker compose -f docker-compose.prod.yml up -d --build
            sleep 8

            echo "=== Health check ==="
            curl -sf http://localhost:3000/health && echo " — /health OK"

            echo "=== Checkout endpoint test ==="
            RESP=$(curl -s -o /tmp/checkout_resp.json -w "%{http_code}" \
              -X POST -H 'Content-Type: application/json' -d '{}' \
              http://localhost:3000/checkout/session)
            echo "HTTP $RESP — body: $(cat /tmp/checkout_resp.json)"
            if [ "$RESP" = "200" ]; then
              echo "SUCCESS: /checkout/session returns 200"
            else
              echo "ERROR: /checkout/session still failing"
              journalctl -u produtovivo-deploy --no-pager -n 30 || true
              docker compose -f docker-compose.prod.yml logs --tail=50 produtovivo || true
              exit 1
            fi

            echo "=== Restart timestamp ==="
            date -u
            echo "STRIPE_PRICE_ID=${PRICE_ID}"
